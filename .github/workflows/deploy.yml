name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload source
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "."
          target: "/tmp/stock_run_88_release"
          rm: true

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            sudo mkdir -p /opt/stock_run_88
            sudo chown -R "$USER:$USER" /opt/stock_run_88
            rsync -a --delete /tmp/stock_run_88_release/ /opt/stock_run_88/ \
              --exclude .env \
              --exclude .venv \
              --exclude /data \
              --exclude /logs \
              --exclude /reports \
              --exclude /agent_memory \
              --exclude frontend/node_modules \
              --exclude frontend/dist
            cd /opt/stock_run_88
            python3 -m venv .venv
            . .venv/bin/activate
            pip install -r requirements.txt
            cd frontend
            npm ci
            npm run build
            cd ..
            sudo systemctl restart stock-run-api
